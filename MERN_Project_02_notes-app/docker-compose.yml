version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: inkwell-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inkwell-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/notesapp
      - JWT_SECRET=change_this_to_a_strong_secret_in_production
      - JWT_EXPIRE=7d
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inkwell-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
 